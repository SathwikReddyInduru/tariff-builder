<!DOCTYPE html>
<!--
    layout.html  —  src/main/resources/templates/builder/layout.html

    Exposes itself as th:fragment="layout(titleFrag, stageFrag, activeStep)"
    Each step page's <html> tag does:
        th:replace="~{builder/layout :: layout(~{::title}, ~{::section}, 1)}"
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(titleFrag, stageFrag, activeStep)">
<head>
    <title th:replace="${titleFrag}">Tariff Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/builder.css}">
</head>
<body>

<div class="app-container">

    <!-- STEP RAIL -->
	<nav class="step-rail">
		
	    <a href="/builder/step1"
	       class="step-node"
	       th:classappend="${activeStep == 1} ? ' active'">
	        <b>STEP 1</b><span>PKG TYPE</span>
	    </a>

	    <a href="/builder/step2"
	       class="step-node"
	       th:classappend="${activeStep == 2} ? ' active'">
	        <b>STEP 2</b><span>SERVICE</span>
	    </a>

	    <a href="/builder/step3"
	       class="step-node"
	       th:classappend="${activeStep == 3} ? ' active'">
	        <b>STEP 3</b><span>DEFAULT</span>
	    </a>

	    <a href="/builder/step4"
	       class="step-node"
	       th:classappend="${activeStep == 4} ? ' active'">
	        <b>STEP 4</b><span>ADDITIONAL</span>
	    </a>

	    <a href="/builder/step5"
	       class="step-node"
	       th:classappend="${activeStep == 5} ? ' active'">
	        <b>STEP 5</b><span>PRICING</span>
	    </a>

	</nav>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="tab active">LIBRARY</div>
        <div class="tab">DRAFTS</div>
    </aside>

    <!-- MAIN -->
    <main class="workspace">

        <!-- HEADER -->
        <header class="header">
            <div class="header-inner">
                <div style="display:flex; align-items:center;">
                    <div class="logo">Builder | user1</div>
                    <div class="module-nav">
                        <div class="mod-btn active">PACKAGE BUILDER</div>
                        <div class="mod-btn">ERELOAD</div>
                    </div>
                    <button class="logout-btn">LOGOUT</button>
                </div>
                <input type="text" placeholder="Name..." class="config-name">
            </div>
        </header>

        <!-- STAGE — step content injected here -->
        <section class="stage" th:replace="${stageFrag}">
            <!-- replaced by each step's <section> -->
        </section>

        <!-- FOOTER -->
        <footer class="config-panel">
            <button class="btn-secondary">Hierarchy</button>
            <button class="btn-primary">SAVE CONFIG</button>
        </footer>

    </main>
</div>

</body>
</html>
